<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fletch Playground</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header class="topbar">
      <span class="brand">Fletch</span>
      <button id="run-btn" type="button">Run</button>
      <span id="status" class="status"></span>
    </header>
    <main class="layout">
      <section id="editor" class="editor" aria-label="Source editor"></section>
      <section class="output" aria-label="Output">
        <pre id="output"></pre>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
